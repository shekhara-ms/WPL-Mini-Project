<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Quiz Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* BACKGROUND */
body {
    min-height: 100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    font-family: 'Segoe UI', sans-serif;
}

@keyframes gradientBG {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

/* NAVBAR */
.navbar {
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* OVERLAY SIDEBAR */
.sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    width: 260px;
    height: calc(100vh - 56px);
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 20px;
    box-shadow: 4px 0 25px rgba(0,0,0,0.4);
    transform: translateX(0);
    transition: transform 0.3s ease;
    z-index: 2000;
}

.sidebar.collapsed {
    transform: translateX(-100%);
}

.sidebar button {
    width: 100%;
    margin-bottom: 12px;
    border-radius: 30px;
}

/* GLASS CARD */
.glass {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    color: #fff;
    animation: fadeIn 0.6s ease;
    max-width: 700px;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(15px);}
    to {opacity:1; transform:translateY(0);}
}

/* QUIZ */
.option {
    background: rgba(255,255,255,0.2);
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    cursor: pointer;
    transition: all 0.3s;
}
.option:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.02);
}
.timer {
    font-weight: bold;
    color: #ffdf6c;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark sticky-top">
  <div class="container-fluid">
    <button class="btn btn-outline-light me-3" onclick="toggleSidebar()">☰</button>
    <span class="navbar-brand fw-bold">SMART QUIZ PRO</span>
  </div>
</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h5>Menu</h5>
    <button class="btn btn-outline-light" onclick="showLeaderboard()">Leaderboard</button>
    <button class="btn btn-outline-danger" onclick="clearLeaderboard()">Clear Scores</button>
    <button class="btn btn-outline-info" onclick="location.reload()">Restart</button>
</div>

<!-- MAIN CONTENT -->
<div class="container-fluid p-4 d-flex justify-content-center">

<!-- START -->
<div id="startScreen" class="glass text-center">
    <h3>Welcome to Smart Quiz</h3>
    <p class="opacity-75">Test your knowledge. Beat the leaderboard.</p>

    <input type="text" id="username" class="form-control my-3" placeholder="Enter your name">

    <select id="difficulty" class="form-select my-3">
        <option value="easy">Easy • 10 sec</option>
        <option value="medium">Medium • 20 sec</option>
        <option value="hard">Hard • 30 sec</option>
    </select>

    <button class="btn btn-warning w-100 fw-bold" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="glass d-none">
    <div class="d-flex justify-content-between">
        <span id="qNo"></span>
        <span class="timer">Time: <span id="time"></span>s</span>
    </div>

    <h5 class="mt-3" id="question"></h5>
    <form id="options"></form>

    <button class="btn btn-success mt-3 w-100" onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="glass d-none text-center">
    <h3>Quiz Completed</h3>
    <p id="scoreText" class="fs-5"></p>
    <button class="btn btn-light" onclick="showLeaderboard()">View Leaderboard</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardScreen" class="glass d-none">
    <h4>Leaderboard</h4>
    <ul id="leaderboardList" class="list-group list-group-flush"></ul>
</div>

</div>

<script>
/* SIDEBAR TOGGLE */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
}

/* QUIZ DATA */
const quizBank={
easy:[
{q:"HTML stands for?",o:["Hyper Text Markup Language","High Tool ML","Hyperlinks"],a:0},
{q:"Which tag for paragraph?",o:["<p>","<h>","<div>"],a:0},
{q:"CSS used for?",o:["Logic","Styling","DB"],a:1},
{q:"JS is?",o:["Language","Framework","DB"],a:0},
{q:"Bootstrap is?",o:["Library","Framework","Server"],a:1},
{q:"HTML file extension?",o:[".html",".css",".js"],a:0},
{q:"Which creates link?",o:["<a>","<img>","<br>"],a:0},
{q:"Color property is?",o:["CSS","JS","HTML"],a:0},
{q:"Which is input tag?",o:["<input>","<form>","<table>"],a:0},
{q:"Web page structure?",o:["HTML","CSS","JS"],a:0}
],
medium:[
{q:"Which stores data in browser?",o:["localStorage","PHP","MySQL"],a:0},
{q:"JS runs on?",o:["Browser","Server","Compiler"],a:0},
{q:"Bootstrap grid uses?",o:["Rows","Tables","Frames"],a:0},
{q:"Responsive design means?",o:["All devices","Fast load","Colorful"],a:0},
{q:"Form validation uses?",o:["JS","HTML only","CSS"],a:0},
{q:"DOM stands for?",o:["Document Object Model","Data Obj Model","Doc Obj Method"],a:0},
{q:"Event example?",o:["onclick","onload","Both"],a:2},
{q:"CSS selector?",o:["class","method","var"],a:0},
{q:"JS variable keyword?",o:["let","int","define"],a:0},
{q:"Bootstrap file type?",o:["CSS","EXE","PHP"],a:0}
],
hard:[
{q:"localStorage data type?",o:["String","Int","Object"],a:0},
{q:"JS is?",o:["Interpreted","Compiled","Assembler"],a:0},
{q:"Arrow function symbol?",o:["=>","->","=="],a:0},
{q:"Bootstrap uses?",o:["Flexbox","Float only","Tables"],a:0},
{q:"Event bubbling relates to?",o:["DOM","CSS","HTML"],a:0},
{q:"JSON stands for?",o:["JavaScript Object Notation","Java Source Obj","None"],a:0},
{q:"setInterval used for?",o:["Timer","Style","DB"],a:0},
{q:"JS scope types?",o:["Global & Local","Private","Static"],a:0},
{q:"HTML5 feature?",o:["Semantic tags","Frames","Fonts"],a:0},
{q:"SPA means?",o:["Single Page App","Simple Page App","Static Page App"],a:0}
]};

let level,questions,timer,sec,current=0,score=0,user;

function startQuiz(){
user=username.value;
level=difficulty.value;
if(user===""){alert("Enter name");return;}
questions=quizBank[level];
sec=level==="easy"?10:level==="medium"?20:30;
current=0; score=0;
startScreen.classList.add("d-none");
quizScreen.classList.remove("d-none");
loadQ();
}

function loadQ(){
clearInterval(timer);
let t=sec;
time.innerText=t;
timer=setInterval(()=>{t--;time.innerText=t;if(t===0)nextQuestion();},1000);
let q=questions[current];
qNo.innerText=`Question ${current+1}/10`;
question.innerText=q.q;
options.innerHTML=q.o.map((x,i)=>
`<div class="option"><input type="radio" name="opt" value="${i}"> ${x}</div>`
).join("");
}

function nextQuestion(){
clearInterval(timer);
let s=document.querySelector('input[name="opt"]:checked');
if(s && +s.value===questions[current].a)score++;
current<9?(current++,loadQ()):finish();
}

function finish(){
quizScreen.classList.add("d-none");
resultScreen.classList.remove("d-none");
scoreText.innerText=`${user}, Score: ${score}/10`;
let lb=JSON.parse(localStorage.lb||"[]");
lb.push({user,score});
localStorage.lb=JSON.stringify(lb);
}

function showLeaderboard(){
leaderboardScreen.classList.remove("d-none");
let lb=JSON.parse(localStorage.lb||"[]").sort((a,b)=>b.score-a.score);
leaderboardList.innerHTML=lb.map(x=>
`<li class="list-group-item bg-transparent text-white">${x.user} - ${x.score}</li>`
).join("");
}

function clearLeaderboard(){
localStorage.removeItem("lb");
leaderboardList.innerHTML="";
}
</script>

</body>
</html>
